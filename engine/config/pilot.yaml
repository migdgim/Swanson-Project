# Corridoio pilota: disbiosi/microbioma (A) <-> tumorigenesi/immunità antitumorale (C)
# Prima bozza dei valori; la query MeSH definitiva si rifinisce in S0.
# I parametri NON vanno mai hardcoded nel codice: si leggono da qui.

corridor:
  id: microbiome_cancer
  name: "Disbiosi/microbioma <-> tumorigenesi e immunità antitumorale"
  A:
    label: "disbiosi / microbioma intestinale"
    mesh_query: '("Dysbiosis"[Mesh] OR "Gastrointestinal Microbiome"[Mesh])'
    # Descrittori MeSH-ancora del corridoio: esclusi dai candidati B (sarebbero banali).
    mesh_anchors: ["Dysbiosis", "Gastrointestinal Microbiome", "Microbiota"]
  C:
    label: "tumorigenesi / immunità antitumorale"
    mesh_query: '("Neoplasms"[Mesh] OR "Carcinogenesis"[Mesh])'
    mesh_anchors: ["Neoplasms", "Carcinogenesis", "Cell Transformation, Neoplastic"]

# Insieme dei B "noti" per il test di CLOSED DISCOVERY (S1).
# Se il sistema non ne ritrova >= 5, la pipeline è rotta: FERMARSI e segnalare.
known_b_terms:
  - { label: "butirrato / SCFA",           hint: "Butyrates; Fatty Acids, Volatile" }
  - { label: "LPS (lipopolisaccaride)",    hint: "Lipopolysaccharides" }
  - { label: "TLR4",                       hint: "Toll-Like Receptor 4" }
  - { label: "IL-6",                       hint: "Interleukin-6" }
  - { label: "TNF-alfa",                   hint: "Tumor Necrosis Factor-alpha" }
  - { label: "Treg",                       hint: "T-Lymphocytes, Regulatory" }
  - { label: "permeabilità intestinale",   hint: "Permeability; barriera intestinale" }

# Finestre temporali del TIME-SLICING (S2). Separazione DEV/TEST non aggirabile dal codice.
time_slicing:
  # NB: i descrittori MeSH del microbioma sono entrati in MeSH ~2012-2014, quindi
  # le finestre partono dopo il 2015 (prima il corridoio A e' quasi vuoto). Rivisto 2026-07-20.
  dev:                                   # QUI e solo qui si tarano soglie e metriche
    graph_max_date: "2018-12-31"         # grafo costruito solo con paper <= questa data
    eval_window: ["2019-01-01", "2021-12-31"]
  test:                                  # si esegue UNA VOLTA SOLA, a parametri congelati
    graph_max_date: "2021-12-31"
    eval_window: ["2022-01-01", "2025-12-31"]
  # Terzo asse temporale (opzionale — "semplice ora, complicabile dopo").
  # Decommentare per attivare una finestra intermedia di validazione.
  # val:
  #   graph_max_date: "2013-12-31"
  #   eval_window: ["2014-01-01", "2018-12-31"]

# Ingest (S0)
ingest:
  sampling: per_year      # per_year = tetto per anno (bilancia DEV/TEST) | flat = un solo taglio
  per_year_cap: 80        # max abstract per anno E per corridoio (solo se sampling=per_year)
  retmax: 5000            # tetto per corridoio se sampling=flat (recency-biased: sconsigliato)
  min_year: 1990
  max_year: 2026          # estremo superiore della finestra di ingest
  api_rate_per_sec: 10    # con API key NCBI (3 senza)

# Estrazione relazioni grounded via LLM (S3-prep). Guardrail: SOLO estrazione dal testo,
# mai giudizio di plausibilità (anti-contaminazione del time-slicing).
relations:
  provider: gemini
  model: gemini-3.1-flash-lite      # PINNATO (2026-07-23) -> versione 3.1-flash-lite-05-2026.
                                    # NON usare 'gemini-flash-lite-latest': è un alias mobile che
                                    # è già driftato 3.1->3.5 tra il 2026-07-21 e il 2026-07-23
                                    # (verificato: stesso abstract, 6 triple con 3.1 vs 1 con 3.5).
                                    # Le 991 estrazioni del 2026-07-21 erano 3.1 (provate identiche
                                    # a questo pin) e sono state rietichettate in cache -> corpus
                                    # uniforme e riproducibile. Cambiare questo nome invalida la cache.
  temperature: 0.0               # determinismo
  max_output_tokens: 2048
  prompt_version: v1             # deve combaciare con relations/prompt.py (entra nella cache)
  sample_size: 100               # abstract per la stima costo/fattibilità (S3-prep)
  extract_max_year: 2021         # estrai solo il pre-cutoff (grafo predittivo S2); 0 = tutto
  # LIMITI free-tier VERIFICATI dalla dashboard AI Studio (2026-07-21, key 'Swanson Project'),
  # modello Gemini 3.1 Flash Lite (pin gemini-3.1-flash-lite). Il free tier costa $0:
  # il listino sotto serve solo come riferimento "se un giorno passassi a pagamento".
  pricing_usd_per_million:
    input: 0.10                  # riferimento a pagamento (DA VERIFICARE sul listino ufficiale)
    output: 0.40                 # (DA VERIFICARE sul listino ufficiale)
  free_tier:
    rpm: 15                      # requests/minute (verificato)
    rpd: 500                     # requests/day (verificato) -> collo di bottiglia reale
    tpm: 250000                  # tokens/minute (verificato)
  client_rpm: 60                 # throttle del client. PAID (billing attivo dal 2026-07-23): 60 rpm
                                 # (1/sec), ben sotto il limite tier-1 -> RPD non più un vincolo.
                                 # SU FREE-TIER rimettere 12 (limite RPM=15), altrimenti falsi stop.

# Ranking dei B (S2/S3)
ranking:
  df_min: 5               # scarta i termini troppo rari (rumore da singolo paper)
  df_max_ratio: 0.25      # scarta i termini troppo generici (stopword di dominio)
  metrics: ["tfidf", "pmi"]   # metriche di specificità da confrontare sul DEV set
  top_k: [10, 25, 50]

# Riproducibilità: seed fisso ovunque ci sia stocasticità
seed: 42
